# Optional profile: enable WiFi + MQTT/TLS cloud gateway on ESP32
# Use with: west build ... -- -DEXTRA_CONF_FILE=prj_wifi_mqtt.conf

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_WIFI=y
CONFIG_NET_L2_ETHERNET=y

CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y

CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=6144
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=2048
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y

CONFIG_DNS_RESOLVER=y
CONFIG_NET_PKT_RX_COUNT=6
CONFIG_NET_PKT_TX_COUNT=6
CONFIG_NET_BUF_RX_COUNT=12
CONFIG_NET_BUF_TX_COUNT=12
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_MAX_CONTEXTS=6
CONFIG_NET_TX_STACK_SIZE=1152
CONFIG_NET_RX_STACK_SIZE=1152

CONFIG_HEAP_MEM_POOL_SIZE=15360
CONFIG_ESP32_TIMER_TASK_STACK_SIZE=1408
CONFIG_MQTT_KEEPALIVE=60

# ---- ESP32-WROOM memory profile for BLE + WiFi + MQTT/TLS together ----
# This project sends short BLE notifications and tiny MQTT payloads, so we can
# trade throughput for RAM headroom.
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_HEAP_MEM_POOL_SIZE=45056

CONFIG_BT_L2CAP_TX_MTU=69
CONFIG_BT_BUF_ACL_RX_SIZE=73
CONFIG_BT_BUF_ACL_TX_SIZE=73
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_L2CAP_TX_BUF_COUNT=3
CONFIG_BT_L2CAP_TX_FRAG_COUNT=1
CONFIG_BT_ATT_PREPARE_COUNT=1
CONFIG_ESP32_BT_CTLR_LE_MAX_CONN=1
CONFIG_ESP32_BT_CTLR_LE_MAX_ACT=2
CONFIG_ESP32_BT_CTLR_ADV_DUP_FILT_MAX=5

CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=4
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=8
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=8
CONFIG_ESP32_WIFI_RX_MGMT_BUF_NUM_DEF=2
CONFIG_ESP32_WIFI_MGMT_SBUF_NUM=8
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n
