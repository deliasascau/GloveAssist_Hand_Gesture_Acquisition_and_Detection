# GloveAssist — ESP32 Kconfig
# Target: ESP32-WROOM DevKit — BLE gateway + UART receiver

# ---- Kernel ----
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=1024
CONFIG_ISR_STACK_SIZE=2048

# ---- GPIO ----
CONFIG_GPIO=y

# ---- UART (inter-MCU communication with STM32 via UART2) ----
CONFIG_UART_INTERRUPT_DRIVEN=y

# ---- Display ----
# OLED is connected to STM32 over I2C2. ESP32 does not drive a display.

# ---- Bluetooth (NUS service) ----
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_BT_DEVICE_NAME="GloveAssist"
CONFIG_BT_MAX_CONN=1
# Keep the hardware validation image simple: no pairing required for nRF Connect/app tests.
# The encrypted profile can be re-enabled after the end-to-end flow is stable.
CONFIG_BT_SMP=n

# ---- PWM (motor + buzzer, optional on ESP32) — disabled for initial build ----
# CONFIG_PWM=y

# ---- Watchdog ----
CONFIG_WATCHDOG=y

# ---- Logging ----
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=4
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# ---- Safety ----
CONFIG_THREAD_MONITOR=y

# ---- Networking stack (optional cloud profile) ----
CONFIG_NETWORKING=n
CONFIG_WIFI=n
CONFIG_MQTT_LIB=n

# ---- Entropy for protocol security ----
CONFIG_ENTROPY_GENERATOR=y
CONFIG_TEST_RANDOM_GENERATOR=y

# ---- Build options ----
CONFIG_ASSERT=n
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_BOOT_BANNER=n
CONFIG_THREAD_NAME=n

# ---- OTA via BLE (MCUboot + SMP) ---- DISABLED for initial hardware validation
# Will re-enable after optimizing RAM usage in Phase 19
CONFIG_BOOTLOADER_MCUBOOT=y
# CONFIG_MCUMGR=y
# CONFIG_MCUMGR_TRANSPORT_BT=y
# CONFIG_MCUMGR_GRP_IMG=y
# CONFIG_MCUMGR_GRP_OS=y
# CONFIG_IMG_MANAGER=y
# CONFIG_STREAM_FLASH=y
# CONFIG_IMG_ERASE_PROGRESSIVELY=y
# CONFIG_IMG_BLOCK_BUF_SIZE=512

# Flash subsystem
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# BLE MTU standard
CONFIG_BT_L2CAP_TX_MTU=65
CONFIG_BT_BUF_ACL_RX_SIZE=69
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_AUTO_DATA_LEN_UPDATE=n
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
CONFIG_BT_GATT_CACHING=n
CONFIG_BT_GATT_SERVICE_CHANGED=n
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_BT_HCI_TX_STACK_SIZE=2048
CONFIG_BT_TX_PROCESSOR_STACK_SIZE=1536
CONFIG_BT_LONG_WQ_STACK_SIZE=2048
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1536

# Heap sized for BLE + UART + security diagnostics
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Additional RAM optimizations
CONFIG_BT_ATT_PREPARE_COUNT=2
CONFIG_SYSTEM_WORKQUEUE_NO_YIELD=y
