# HARDWARE TEST CONFIG - Minimal BLE + UART
# Quick validation for soldering and hardware connections

# === Kernel basics ===
CONFIG_MAIN_STACK_SIZE=1024
CONFIG_IDLE_STACK_SIZE=512
CONFIG_ISR_STACK_SIZE=1536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

# === GPIO + UART ===
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# === BLE Peripheral (minimal) ===
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="GloveTest"
CONFIG_BT_DEVICE_NAME_MAX=16
CONFIG_BT_MAX_CONN=1

# BLE NUS service for testing
CONFIG_BT_NUS=y
CONFIG_BT_NUS_THREAD_STACK_SIZE=1024
CONFIG_BT_NUS_UART_BUFFER_SIZE=64

# BLE stack minimal
CONFIG_BT_L2CAP_TX_MTU=100
CONFIG_BT_BUF_ACL_TX_SIZE=100
CONFIG_BT_BUF_ACL_RX_SIZE=100
CONFIG_BT_CTLR_TX_BUFFERS=3
CONFIG_BT_CTLR_RX_BUFFERS=3

# === Logging (verbose for debugging) ===
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=512
CONFIG_PRINTK=y

# === Safety ===
CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=y

# === Memory optimization ===
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_SIZE_OPTIMIZATIONS=y

# === Thread monitoring ===
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
