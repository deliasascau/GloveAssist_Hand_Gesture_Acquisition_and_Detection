# MCUboot configuration for GloveAssist ESP32 OTA
# Built as a child image by `west build --sysbuild`
#
# SECURITY NOTE: CONFIG_BOOT_SIGNATURE_TYPE_NONE is for development/demo only.
# Before production deployment, switch to ECDSA_P256 or ED25519 with a
# private key stored securely (never in the repository).

# No crypto signature — simpler build, suitable for demo
CONFIG_BOOT_SIGNATURE_TYPE_NONE=y

# Flash layout support
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# MCUboot swap algorithm: scratch-based (uses scratch_partition defined in overlay)
# Supports "revert" mode: if new image does not confirm itself, MCUboot reverts
# to the old image on next reset — this is the MDR-relevant safety feature.
CONFIG_BOOT_SWAP_USING_SCRATCH=y

# Maximum number of image sectors.
# ESP32 default sysbuild slot0 is 0x150000 bytes = 336 sectors of 4KB.
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=384

# Enable bootloader logs for runtime diagnosis on hardware.
CONFIG_MCUBOOT_LOG_LEVEL_INF=y
CONFIG_MCUBOOT_UTIL_LOG_LEVEL_INF=y
