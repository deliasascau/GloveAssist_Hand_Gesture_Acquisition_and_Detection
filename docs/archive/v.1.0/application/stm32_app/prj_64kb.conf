# STM32 OPTIMIZED for 64KB - ALL HARDWARE FEATURES
# Gestures (ADC), OLED, Buzzer, Motor, UART

# === Kernel minimal ===
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=384
CONFIG_IDLE_STACK_SIZE=256
CONFIG_ISR_STACK_SIZE=512
CONFIG_HEAP_MEM_POOL_SIZE=512
CONFIG_EVENTS=y

# === Hardware ===
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_I2C=y
CONFIG_PWM=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_WATCHDOG=y

# === Display (OLED SSD1306) ===
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
CONFIG_CHARACTER_FRAMEBUFFER=y
# Use minimal font
CONFIG_CFB_FONT_SIZE_8=y

# === Logging MINIMAL ===
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_PRINTK=n
CONFIG_EARLY_CONSOLE=n
CONFIG_CONSOLE=n

# === Printf optimization ===
CONFIG_CBPRINTF_NANO=y
CONFIG_CBPRINTF_COMPLETE=n

# === Size optimizations ===
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_COMPILER_OPT="Os"
CONFIG_NO_OPTIMIZATIONS=n
CONFIG_DEBUG_OPTIMIZATIONS=n

# === Disable heavy features ===
CONFIG_ASSERT=n
CONFIG_DEBUG=n
CONFIG_THREAD_MONITOR=n
CONFIG_INIT_STACKS=n
CONFIG_BOOT_BANNER=n
CONFIG_THREAD_NAME=n

# === Memory minimal ===
CONFIG_TIMESLICING=n
CONFIG_KERNEL_MEM_POOL=n
