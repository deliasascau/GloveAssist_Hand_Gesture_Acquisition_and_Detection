# STM32 OPTIMIZED for 64KB - ALL HARDWARE FEATURES
# Gestures (ADC), OLED, Buzzer, Motor, UART

# === Kernel minimal ===
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=384
CONFIG_IDLE_STACK_SIZE=256
CONFIG_ISR_STACK_SIZE=512
CONFIG_HEAP_MEM_POOL_SIZE=512
CONFIG_EVENTS=y

# === Hardware ===
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_I2C=y
# CONFIG_PWM=y  # Motor folosește software PWM (GPIO)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_WATCHDOG=y

# === Flash and NVS (for calibration storage) ===
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# === Entropy for security (needed by sys_rand_get) ===
CONFIG_TEST_RANDOM_GENERATOR=y

# === OLED raw I2C driver in haptic_ui.c ===
# Keep Zephyr's display driver disabled so it does not initialise the same bus.
# CONFIG_DISPLAY is not set
# CONFIG_SSD1306 is not set

# === Logging MINIMAL ===
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_EARLY_CONSOLE=n

# === Printf optimization ===
CONFIG_CBPRINTF_NANO=y
CONFIG_CBPRINTF_COMPLETE=n

# === Size optimizations ===
CONFIG_SIZE_OPTIMIZATIONS=y

# === Minimal features for size ===
CONFIG_BOOT_BANNER=n
CONFIG_THREAD_NAME=n
CONFIG_ASSERT=n
CONFIG_DEBUG=n
CONFIG_THREAD_MONITOR=n
CONFIG_STACK_SENTINEL=n
CONFIG_INIT_STACKS=n
CONFIG_TIMESLICING=n
