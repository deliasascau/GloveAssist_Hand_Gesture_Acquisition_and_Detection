# Extra options for Zephyr 4.x and newer.
#
# P-256 ECC for Secure Connections runs in the BT Long Work Queue thread.
# Zephyr 4.x exposes this stack-size symbol as user-configurable; Zephyr 3.7
# keeps it hidden, so the common prj.conf must not assign it.
CONFIG_BT_LONG_WQ_STACK_SIZE=4096

CONFIG_BT_TX_PROCESSOR_STACK_SIZE=1024

# TLS 1.2 only: Adafruit IO accepts ECDHE-RSA-AES128-GCM-SHA256 on 8883.
# Keep the cipher list tight to reduce mbedTLS RAM/code pressure on ESP32.
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256=y
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_NET_SOCKETS_TLS_CONNECT_TIMEOUT=20000

# Zephyr 4.4.0-rc1 / mbedTLS 4.0 (tf-psa-crypto) Kconfig bug:
# Kconfig.ciphersuites selects RSA key-pair types but omits RSA_PUBLIC_KEY.
CONFIG_PSA_WANT_KEY_TYPE_RSA_PUBLIC_KEY=y

# Keep ECDHE on secp256r1 / P-256 and avoid ESP32's partial PSA ECC accel,
# which produced MBEDTLS_ERR_SSL_HW_ACCEL_FAILED during TLS handshake.
CONFIG_MBEDTLS_PSA_P256M_DRIVER_ENABLED=n
