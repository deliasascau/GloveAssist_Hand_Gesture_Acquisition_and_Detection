# ===========================================================================
# GloveAssist ESP32 - prj.conf
# Board:  esp32_devkitc/esp32/procpu
# Role:   Brain (gesture classification, BLE, WiFi, MQTT)
# ===========================================================================
#
# Phase 1  <- CURRENT: UART RX from STM32, log raw sensor data
# Phase 3  : Gesture classifier (threshold-based, no ML yet)
# Phase 4  : Send display commands to STM32 (OLED text)
# Phase 5  : Send haptic commands to STM32 (buzz/vibrate)
# Phase 6  : BLE NUS (Nordic UART Service)
# Phase 7  : WiFi + MQTT
# Phase 8  : Calibration support
# Phase 9  : OTA via MCUboot
#

# Kernel
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=1024
CONFIG_ISR_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=29696

# GPIO
CONFIG_GPIO=y

# UART - STM32 communication UART2 (GPIO17 TX / GPIO16 RX)
# Polling mode; nu necesita UART_INTERRUPT_DRIVEN.
CONFIG_SERIAL=y

# BLE peripheral for LightBlue. Service: Nordic UART Service compatible UUIDs.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="GloveAssist"
CONFIG_BT_MAX_CONN=1
# SMP: Just-Works pairing -> link-layer encryption, stops passive BLE sniffing.
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
# Privacy: resolvable private address rotated periodically (anti-tracking).
CONFIG_BT_PRIVACY=y
CONFIG_BT_L2CAP_TX_MTU=65
CONFIG_BT_BUF_ACL_RX_SIZE=69
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_AUTO_DATA_LEN_UPDATE=n
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
CONFIG_BT_GATT_CACHING=n
CONFIG_BT_GATT_SERVICE_CHANGED=n
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_BT_TX_PROCESSOR_STACK_SIZE=1536
CONFIG_BT_ATT_PREPARE_COUNT=2

# Logging (ESP32 has USB-to-UART CP210x on UART0, separate from STM32 comm)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1536

# Boot banner
CONFIG_BOOT_BANNER=y

# NVS + Settings subsystem (calibration threshold persistence).
# SOC_FLASH_ESP32 is auto-selected by the SoC, but the generic Zephyr flash
# API layer (CONFIG_FLASH) and flash-map (CONFIG_FLASH_MAP) must be explicitly
# enabled — without them NVS/SETTINGS_NVS are silently dropped and Kconfig
# falls back to SETTINGS_NONE (a no-op backend that never writes to flash).
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
