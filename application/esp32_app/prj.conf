# ===========================================================================
# GloveAssist ESP32 - prj.conf
# Board:  esp32_devkitc_wroom/esp32/procpu
# Role:   Brain (gesture classification, BLE, WiFi, MQTT)
# ===========================================================================
#
# Phase 1  <- CURRENT: UART RX from STM32, log raw sensor data
# Phase 3  : Gesture classifier (threshold-based)
# Phase 4  : Send display commands to STM32 (OLED text)
# Phase 5  : Send haptic commands to STM32 (buzz/vibrate)
# Phase 6  : BLE NUS (Nordic UART Service)
# Phase 7  : WiFi + MQTT / Adafruit IO
# Phase 8  : Calibration support
#

# Kernel
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_IDLE_STACK_SIZE=1024
CONFIG_ISR_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y

# GPIO
CONFIG_GPIO=y

# UART - STM32 communication UART2 (GPIO17 TX / GPIO16 RX)
# Polling mode; nu necesita UART_INTERRUPT_DRIVEN.
CONFIG_SERIAL=y

# BLE peripheral for LightBlue. Service: Nordic UART Service compatible UUIDs.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="GloveAssist"
CONFIG_BT_MAX_CONN=1
# BLE NUS uses SMP passkey pairing with MITM protection. ESP32 displays the
# 6-digit passkey on the STM32 OLED via the secure UART command channel.
# Bonding is enabled so phone reconnects can reuse the authenticated LTK.
CONFIG_BT_SMP=y
CONFIG_BT_SMP_ENFORCE_MITM=y
# ESP32 RAM is very tight with WiFi+MQTT/TLS active. Zephyr defaults to
# Secure Connections-only pairing, which uses ECC and caused immediate BLE
# disconnects on this build. Secure Connections is still allowed when both
# peers can complete it, but it is not required. Passkey pairing targets
# BT_SECURITY_L3 authenticated link-layer encryption.
CONFIG_BT_SMP_SC_PAIR_ONLY=n
# Enable bonding so the LTK is stored in NVS via the settings subsystem.
# Without this, ESP32 never saves the LTK; on reconnect the phone sends its
# cached LTK, ESP32 rejects it (PIN_OR_KEY_MISSING) and SMP loops forever.
# BT_SETTINGS persists bond keys across reboots using the NVS/settings backend
# already configured below. After a firmware flash that clears NVS, the code
# detects PIN_OR_KEY_MISSING, calls bt_unpair(), disconnects, and the phone
# re-pairs cleanly on the next attempt.
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_PRIVACY=n
CONFIG_BT_L2CAP_TX_MTU=65
CONFIG_BT_BUF_ACL_RX_SIZE=69
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_AUTO_DATA_LEN_UPDATE=n
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
CONFIG_BT_GATT_CACHING=n
CONFIG_BT_GATT_SERVICE_CHANGED=n
# BT RX thread: handles HCI events; SMP state machine runs here.
CONFIG_BT_RX_STACK_SIZE=3072
CONFIG_BT_ATT_PREPARE_COUNT=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_SECURITY_ERR_TO_STR=y

# Logging (ESP32 has USB-to-UART CP210x on UART0, separate from STM32 comm)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1536

# Boot banner
CONFIG_BOOT_BANNER=y

# NVS + Settings subsystem (calibration threshold persistence).
# SOC_FLASH_ESP32 is auto-selected by the SoC, but the generic Zephyr flash
# API layer (CONFIG_FLASH) and flash-map (CONFIG_FLASH_MAP) must be explicitly
# enabled — without them NVS/SETTINGS_NVS are silently dropped and Kconfig
# falls back to SETTINGS_NONE (a no-op backend that never writes to flash).
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NET_BUF=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# WiFi + MQTT cloud publishing to Adafruit IO.
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y

CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_SNTP=y

CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=2
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=3
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=3
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n

CONFIG_NET_MAX_CONN=4
CONFIG_NET_MAX_CONTEXTS=4
CONFIG_NET_BUF_RX_COUNT=8
# TLS MQTT publishes can need several chained TX buffers, especially during
# retransmission on mobile hotspots. Keep RX small, but give TX a little headroom.
CONFIG_NET_BUF_TX_COUNT=12
CONFIG_DNS_RESOLVER_MAX_SERVERS=1
CONFIG_NET_SOCKETS_CONNECT_TIMEOUT=5000

CONFIG_MQTT_LIB=y
CONFIG_MQTT_KEEPALIVE=60

CONFIG_MQTT_LIB_TLS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_HAVE_TIME_DATE=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
# mbedTLS heap: Adafruit IO TLS/X.509 handshake needs >28KB (confirmed).
# Reduced from 40KB to 36KB to free 4KB of dram0 for the enlarged BT RX
# stack above. 36KB gives 8KB headroom above the confirmed minimum.
CONFIG_MBEDTLS_HEAP_SIZE=36864
# Main heap 40KB: WiFi adapter functioneaza la 40KB (OOM la 32KB confirmat).
CONFIG_HEAP_MEM_POOL_SIZE=40960
# Adafruit IO trimite leaf + intermediate cert in handshake (>2KB).
# Valoarea minima necesara pentru a nu primi MBEDTLS_ERR_SSL_BUFFER_TOO_SMALL
# care aparea ca -113 ECONNABORTED la mqtt_connect().
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=8192
CONFIG_MBEDTLS_SSL_DTLS_CONNECTION_ID=n

CONFIG_GLOVE_MQTT_TLS=y
CONFIG_GLOVE_MQTT_BROKER_HOST="io.adafruit.com"
CONFIG_GLOVE_MQTT_BROKER_PORT=8883

# Logging TLS: temporar y pentru a vedea "TLS handshake error: -0x%x"
CONFIG_NET_LOG=y
CONFIG_PRINTK=y
CONFIG_THREAD_NAME=n
CONFIG_INIT_STACKS=n
