# Extra options for Zephyr 3.7.
#
# The Zephyr 3.7 ESP32 WiFi stack pulls in ESP-IDF headers that expect
# POSIX/newlib time types such as suseconds_t.
CONFIG_NEWLIB_LIBC=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Zephyr 3.7 places WiFi, BT, TLS heaps and thread stacks in ESP32 DRAM0.
# Keep these tighter than the Zephyr 4.x local/dev profile so the CI artifact
# links with WiFi + BLE + MQTT/TLS enabled.
CONFIG_MAIN_STACK_SIZE=3072
CONFIG_BT_RX_STACK_SIZE=2560
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1024
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1024
CONFIG_NET_RX_STACK_SIZE=1536
CONFIG_NET_TCP_WORKQ_STACK_SIZE=1536
CONFIG_MBEDTLS_HEAP_SIZE=24576
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=4096

# Zephyr 3.7 uses the older mbedTLS Kconfig names for these TLS features.
CONFIG_MBEDTLS_TLS_VERSION_1_2=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y

CONFIG_POSIX_TIMERS=y
