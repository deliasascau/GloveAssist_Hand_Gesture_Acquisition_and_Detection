# ===========================================================================
# GloveAssist ESP32 - WiFi + MQTT cloud profile
#
# Usage:
#   west build ... -- -DEXTRA_CONF_FILE=prj_wifi_mqtt.conf
#
# TLS (port 8883) is ENABLED by default in this profile.
# Plain TCP (port 1883): comment out the TLS block below.
#
# Set your actual credentials before building:
#   CONFIG_GLOVE_WIFI_SSID, CONFIG_GLOVE_WIFI_PASSWORD
#   For authenticated brokers: CONFIG_GLOVE_MQTT_USERNAME / PASSWORD (add to Kconfig)
# ===========================================================================

# WiFi driver (ESP32 built-in)
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y

# Network stack
CONFIG_NETWORKING=y
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y
CONFIG_DNS_RESOLVER=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y

# MQTT
CONFIG_MQTT_LIB=y
CONFIG_MQTT_KEEPALIVE=60

# ---------------------------------------------------------------------------
# TLS block — comment out to use plain TCP on port 1883
# ---------------------------------------------------------------------------
CONFIG_MQTT_LIB_TLS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_TLS_VERSION_1_2=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_RSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_MBEDTLS_SHA256_ENABLED=y
CONFIG_MBEDTLS_SHA512_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
CONFIG_GLOVE_MQTT_TLS=y
CONFIG_GLOVE_MQTT_BROKER_PORT=8883
# ---------------------------------------------------------------------------

# Credentials — CHANGE THESE
CONFIG_GLOVE_WIFI_SSID="YourSSID"
CONFIG_GLOVE_WIFI_PASSWORD="YourPassword"
CONFIG_GLOVE_MQTT_BROKER_HOST="test.mosquitto.org"

# Increase heap for TLS handshake buffers (~16 KB needed)
CONFIG_HEAP_MEM_POOL_SIZE=98304
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# MbedTLS heap (used during TLS handshake)
CONFIG_MBEDTLS_HEAP_SIZE=16384

# Logging
CONFIG_NET_LOG=n
CONFIG_WIFI_LOG_LEVEL_WRN=y
