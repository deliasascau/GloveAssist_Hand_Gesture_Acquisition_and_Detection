# ===========================================================================
# GloveAssist STM32 - prj.conf
# Board:  stm32_min_dev@blue (STM32F103C8 "Blue Pill")
# Role:   Sensor + Actuator Hub
# ===========================================================================
#
# Phase 1  <- DONE: ADC (4 flex sensors) + UART TX to ESP32
# Phase 2  <- ACTIVE: Heartbeat + CMD RX handler
# Phase 4  <- ACTIVE: OLED SSD1306 I2C2 (PB10/PB11)
# Phase 5  <- ACTIVE: Passive buzzer PWM TIM3_CH1 (PB4) + Motor PWM TIM4_CH1 (PB6)
# Phase 8  : NVS calibration storage
#

# Kernel
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=3072
CONFIG_IDLE_STACK_SIZE=256

# GPIO (LED PC13)
CONFIG_GPIO=y

# Hardware watchdog - STM32 IWDG, fed by the main health loop.
CONFIG_WATCHDOG=y

# ADC - disabled: ADC1 is owned by the app via direct register writes
# CONFIG_ADC is not set

# UART - ESP32 communication USART1 (PA9 TX / PA10 RX)
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# I2C - SSD1306 OLED on I2C2 (PB10/PB11)
CONFIG_I2C=y

# Display - SSD1306 OLED driver
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# PWM - Motor vibratii TIM4_CH1 (PB6)
CONFIG_PWM=y
CONFIG_PWM_STM32=y

# Logging
# USART1 is reserved for ESP32 comm so no UART console backend.
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_EARLY_CONSOLE=n

# Size optimizations
CONFIG_CBPRINTF_NANO=y
CONFIG_CBPRINTF_COMPLETE=n
CONFIG_SIZE_OPTIMIZATIONS=y
CONFIG_BOOT_BANNER=n
CONFIG_THREAD_NAME=n
CONFIG_ASSERT=n
CONFIG_DEBUG=n
