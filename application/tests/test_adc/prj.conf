# ADC test — UART console ENABLED pe USART1 (PA9/PA10)
# Printează valorile raw ADC ca text, citibil direct în PuTTY pe COM11 via GPIO16

CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_SERIAL=y

# Activeaza consola pe USART1 (PA9 TX = GPIO16 RX pe ESP32)
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Scoate bannere inutile
CONFIG_BOOT_BANNER=n
