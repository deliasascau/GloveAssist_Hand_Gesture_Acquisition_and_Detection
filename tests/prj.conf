# Ztest prj.conf for unit tests — native_sim target
# All hardware drivers disabled; tests exercise only pure-C modules.

CONFIG_ZTEST=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2

# Hardware drivers — disabled (no hardware on native_sim)
CONFIG_GPIO=n
CONFIG_ADC=n
CONFIG_SPI=n
CONFIG_PWM=n
CONFIG_BT=n
CONFIG_WATCHDOG=n
CONFIG_DISPLAY=n
CONFIG_UART_INTERRUPT_DRIVEN=n

# Stack sizing for native_sim
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
