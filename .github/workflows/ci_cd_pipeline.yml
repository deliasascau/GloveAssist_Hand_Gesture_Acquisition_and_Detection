
name: GloveAssist CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  ZEPHYR_SDK_VERSION: "1.0.1"

jobs:
  # ---------- Static analysis ----------
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --inconclusive --std=c11 \
            --suppress=missingIncludeSystem \
            -I application/common/include \
            -I application/stm32_app/include \
            -I application/esp32_app/include \
            application/common/src/ \
            application/stm32_app/src/ \
            application/esp32_app/src/ \
            --error-exitcode=1

  # ---------- Build STM32 ----------
  build-stm32:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4
    steps:
      - uses: actions/checkout@v4

      - name: Initialise West workspace
        run: |
          west init -l .
          west update --narrow -o=--depth=1

      - name: Build for STM32 Blue Pill
        run: |
          west build -b stm32_min_dev@blue \
            application/stm32_app \
            --build-dir build-stm32

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stm32-firmware
          path: build-stm32/zephyr/zephyr.*

  # ---------- Build ESP32 ----------
  build-esp32:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4
    steps:
      - uses: actions/checkout@v4

      - name: Initialise West workspace
        run: |
          west init -l .
          west update --narrow -o=--depth=1

      - name: Build for ESP32
        run: |
          west build -b esp32_devkitc/esp32/procpu \
            application/esp32_app \
            --build-dir build-esp32

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: build-esp32/zephyr/zephyr.*

  # ---------- Unit Tests ----------
  unit-tests:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4
    steps:
      - uses: actions/checkout@v4

      - name: Initialise West workspace
        run: |
          west init -l .
          west update --narrow -o=--depth=1

      - name: Build and run tests (native_sim)
        run: |
          west build -b native_sim tests --build-dir build-tests
          west build -t run --build-dir build-tests
