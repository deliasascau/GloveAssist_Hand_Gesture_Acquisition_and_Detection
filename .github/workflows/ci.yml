name: GloveAssist CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  CI_IMAGE: ghcr.io/deliasascau/gloveassist-zephyr-ci:0.16.8
  CI_IMAGE_DOCKERFILE: Dockerfile.ci

jobs:

  ensure-ci-image:
    name: "Ensure CI Image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull current image or rebuild
        run: |
          set -euo pipefail

          image="${CI_IMAGE}"
          dockerfile="${CI_IMAGE_DOCKERFILE}"
          dockerfile_sha="$(sha256sum "$dockerfile" | awk '{print $1}')"
          rebuild=1

          echo "CI image: $image"
          echo "Dockerfile SHA: $dockerfile_sha"

          if docker pull "$image"; then
            image_sha="$(docker inspect "$image" --format '{{ index .Config.Labels "io.gloveassist.dockerfile-sha" }}' 2>/dev/null || true)"
            if [ "$image_sha" = "$dockerfile_sha" ]; then
              echo "CI image is already up to date."
              rebuild=0
            else
              echo "CI image exists, but Dockerfile changed."
              echo "Image SHA: $image_sha"
            fi
          else
            echo "CI image does not exist yet."
          fi

          if [ "$rebuild" = "1" ]; then
            docker build \
              --label "io.gloveassist.dockerfile-sha=$dockerfile_sha" \
              -f "$dockerfile" \
              -t "$image" \
              .
            docker push "$image"
          fi

  build-stm32:
    name: "Build STM32"
    runs-on: ubuntu-latest
    needs: [ensure-ci-image]
    container:
      image: ghcr.io/deliasascau/gloveassist-zephyr-ci:0.16.8
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark Git worktrees safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /opt/zephyr-workspace
          git config --global --add safe.directory /opt/zephyr-workspace/zephyr

      - name: Build STM32
        run: |
          west -z "$ZEPHYR_BASE" build \
            -p always \
            -b stm32_min_dev@blue \
            "$GITHUB_WORKSPACE/application/stm32_app" \
            --build-dir "$GITHUB_WORKSPACE/build-stm32"

      - uses: actions/upload-artifact@v4
        with:
          name: stm32-firmware
          path: build-stm32/zephyr/zephyr.bin

  build-esp32:
    name: "Build ESP32"
    runs-on: ubuntu-latest
    needs: [ensure-ci-image]
    container:
      image: ghcr.io/deliasascau/gloveassist-zephyr-ci:0.16.8
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Mark Git worktrees safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /opt/zephyr-workspace
          git config --global --add safe.directory /opt/zephyr-workspace/zephyr

      - name: Build ESP32
        run: |
          board="esp32_devkitc_wroom/esp32/procpu"
          if [ -f /opt/zephyr-workspace/zephyr/boards/espressif/esp32_devkitc/esp32_devkitc_procpu.yaml ]; then
            board="esp32_devkitc/esp32/procpu"
          fi

          west -z "$ZEPHYR_BASE" build \
            -p always \
            -b "$board" \
            "$GITHUB_WORKSPACE/application/esp32_app" \
            --build-dir "$GITHUB_WORKSPACE/build-esp32"

      - uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: build-esp32/zephyr/zephyr.bin

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: [ensure-ci-image]
    container:
      image: ghcr.io/deliasascau/gloveassist-zephyr-ci:0.16.8
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: host
    steps:
      - uses: actions/checkout@v4

      - name: Mark Git worktrees safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory /opt/zephyr-workspace
          git config --global --add safe.directory /opt/zephyr-workspace/zephyr

      - name: Build + Run tests
        run: |
          west -z "$ZEPHYR_BASE" build \
            -p always \
            -b native_sim/native/64 \
            "$GITHUB_WORKSPACE/tests" \
            --build-dir "$GITHUB_WORKSPACE/build-tests"
          "$GITHUB_WORKSPACE/build-tests/zephyr/zephyr.exe"

  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [build-stm32, build-esp32, unit-tests]
    steps:
      - run: echo "Toate job-urile CI au trecut OK"

  flash-stm32:
    name: "Flash STM32"
    runs-on: [self-hosted, Windows, x64]
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main' && vars.RUN_HARDWARE_TESTS == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Run STM32 flash script
        shell: cmd
        run: |
          powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File scripts\flash_stm32.ps1 > "%RUNNER_TEMP%\flash-stm32.log" 2>&1
          set FLASH_EXIT=%ERRORLEVEL%
          type "%RUNNER_TEMP%\flash-stm32.log"
          exit /b %FLASH_EXIT%
      - name: Upload STM32 flash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flash-stm32-logs
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}\flash-stm32.log
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-stm32\CMakeCache.txt
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-stm32\CMakeFiles\CMakeError.log
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-stm32\CMakeFiles\CMakeOutput.log
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-stm32\CMakeFiles\CMakeConfigureLog.yaml

  flash-esp32:
    name: "Flash ESP32"
    runs-on: [self-hosted, Windows, x64]
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main' && vars.RUN_HARDWARE_TESTS == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Create ESP32 credentials from secrets
        shell: cmd
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
          GLOVE_MQTT_USERNAME: ${{ secrets.GLOVE_MQTT_USERNAME }}
          GLOVE_MQTT_PASSWORD: ${{ secrets.GLOVE_MQTT_PASSWORD }}
        run: C:\zephyr-workspace\.venv\Scripts\python.exe scripts\write_esp32_credentials.py --require-wifi application\esp32_app\credentials.conf
      - name: Run ESP32 flash script
        shell: cmd
        run: |
          powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File scripts\flash_esp32.ps1 > "%RUNNER_TEMP%\flash-esp32.log" 2>&1
          set FLASH_EXIT=%ERRORLEVEL%
          type "%RUNNER_TEMP%\flash-esp32.log"
          exit /b %FLASH_EXIT%
      - name: Upload ESP32 flash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flash-esp32-logs
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}\flash-esp32.log
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-esp32\CMakeCache.txt
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-esp32\CMakeFiles\CMakeError.log
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-esp32\CMakeFiles\CMakeOutput.log
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-esp32\CMakeFiles\CMakeConfigureLog.yaml

  hardware-e2e:
    name: "Hardware E2E"
    runs-on: [self-hosted, Windows, x64]
    needs: [flash-stm32, flash-esp32]
    if: github.ref == 'refs/heads/main' && vars.RUN_HARDWARE_TESTS == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Run hardware E2E smoke test
        shell: powershell
        env:
          ESP32_SERIAL_PORT: ${{ vars.ESP32_SERIAL_PORT }}
          ESP32_SERIAL_BAUD: ${{ vars.ESP32_SERIAL_BAUD }}
          REQUIRE_BLE_CLIENT: ${{ vars.REQUIRE_BLE_CLIENT }}
        run: |
          $e2eArgs = @('-TimeoutSec', '180')

          if ($env:REQUIRE_BLE_CLIENT -eq 'true') {
            $e2eArgs += '-RequireBleClient'
          } else {
            $e2eArgs += '-SkipBleClient'
          }

          .\scripts\e2e_hardware_smoke.ps1 @e2eArgs
      - name: Upload hardware E2E logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardware-e2e-logs
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}\gloveassist-${{ github.run_id }}-${{ github.run_attempt }}-e2e\*

  release:
    name: "Release ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: stm32-firmware, path: out/stm32 }
      - uses: actions/download-artifact@v4
        with: { name: esp32-firmware, path: out/esp32 }
      - run: |
          mv out/stm32/zephyr.bin gloveassist-stm32-${{ github.ref_name }}.bin
          mv out/esp32/zephyr.bin  gloveassist-esp32-${{ github.ref_name }}.bin
      - uses: softprops/action-gh-release@v2
        with:
          name: "GloveAssist ${{ github.ref_name }}"
          body: "Release automat. Toate testele au trecut."
          files: "*.bin"
