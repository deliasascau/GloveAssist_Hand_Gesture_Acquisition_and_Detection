name: GloveAssist CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  SDK_VER: "0.16.8"
  SDK_DIR: "/opt/zephyr-sdk-0.16.8"

jobs:

  build-stm32:
    name: "Build STM32"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install west + Zephyr host deps + ARM toolchain
        run: |
          pip3 install west
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget xz-utils file make gcc-arm-none-eabi

      - name: West init & update
        run: |
          west init -l .
          west update --narrow -o=--depth=1
          echo "ZEPHYR_BASE=$(west topdir)/zephyr" >> $GITHUB_ENV
          echo "APP_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Install Zephyr Python requirements
        run: pip3 install -r $ZEPHYR_BASE/scripts/requirements.txt

      - name: Install Zephyr SDK (ARM only)
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz -P /opt
          tar xf /opt/zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz -C /opt
          ${SDK_DIR}/setup.sh -t arm-zephyr-eabi -h -c

      - name: Build STM32
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=${SDK_DIR}
          west build -p always -b stm32_min_dev@blue $APP_DIR/application/stm32_app --build-dir $APP_DIR/build-stm32

      - uses: actions/upload-artifact@v4
        with:
          name: stm32-firmware
          path: build-stm32/zephyr/zephyr.bin

  build-esp32:
    name: "Build ESP32"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install west + Zephyr host deps
        run: |
          pip3 install west
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget xz-utils file make

      - name: West init & update
        run: |
          west init -l .
          west update --narrow -o=--depth=1
          echo "ZEPHYR_BASE=$(west topdir)/zephyr" >> $GITHUB_ENV
          echo "APP_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Install Zephyr Python requirements
        run: pip3 install -r $ZEPHYR_BASE/scripts/requirements.txt

      - name: Install Zephyr SDK (Xtensa ESP32)
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz -P /opt
          tar xf /opt/zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz -C /opt
          ${SDK_DIR}/setup.sh -t xtensa-espressif_esp32_zephyr-elf -h -c

      - name: Build ESP32
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=${SDK_DIR}
          west build -p always -b esp32_devkitc_wroom/esp32/procpu $APP_DIR/application/esp32_app --build-dir $APP_DIR/build-esp32

      - uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: build-esp32/zephyr/zephyr.bin

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install west + Zephyr host deps + GCC host
        run: |
          pip3 install west
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget xz-utils file make gcc g++

      - name: West init & update
        run: |
          west init -l .
          west update --narrow -o=--depth=1
          echo "ZEPHYR_BASE=$(west topdir)/zephyr" >> $GITHUB_ENV
          echo "APP_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Install Zephyr Python requirements
        run: pip3 install -r $ZEPHYR_BASE/scripts/requirements.txt

      - name: Install Zephyr SDK (host tools)
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${SDK_VER}/zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz -P /opt
          tar xf /opt/zephyr-sdk-${SDK_VER}_linux-x86_64_minimal.tar.xz -C /opt
          ${SDK_DIR}/setup.sh -h -c

      - name: Build + Run tests
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=${SDK_DIR}
          west build -p always -b native_sim/native/64 $APP_DIR/tests --build-dir $APP_DIR/build-tests
          $APP_DIR/build-tests/zephyr/zephyr.exe

  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [build-stm32, build-esp32, unit-tests]
    steps:
      - run: echo "Toate job-urile CI au trecut OK"

  flash-stm32:
    name: "Flash STM32"
    runs-on: [self-hosted, Windows, x64]
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: powershell -ExecutionPolicy Bypass -File scripts\flash_stm32.ps1

  flash-esp32:
    name: "Flash ESP32"
    runs-on: [self-hosted, Windows, x64]
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: powershell -ExecutionPolicy Bypass -File scripts\flash_esp32.ps1

  release:
    name: "Release ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: stm32-firmware, path: out/stm32 }
      - uses: actions/download-artifact@v4
        with: { name: esp32-firmware, path: out/esp32 }
      - run: |
          mv out/stm32/zephyr.bin gloveassist-stm32-${{ github.ref_name }}.bin
          mv out/esp32/zephyr.bin  gloveassist-esp32-${{ github.ref_name }}.bin
      - uses: softprops/action-gh-release@v2
        with:
          name: "GloveAssist ${{ github.ref_name }}"
          body: "Release automat. Toate testele au trecut."
          files: "*.bin"
