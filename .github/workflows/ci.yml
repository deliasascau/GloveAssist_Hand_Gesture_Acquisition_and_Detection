name: GloveAssist CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:

  build-stm32:
    name: "Build STM32"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.26.14
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/build_stm32.sh
      - uses: actions/upload-artifact@v4
        with:
          name: stm32-firmware
          path: build-stm32/zephyr/zephyr.bin

  build-esp32:
    name: "Build ESP32"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.26.14
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/build_esp32.sh
      - uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: build-esp32/zephyr/zephyr.bin

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.26.14
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/run_tests.sh

  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [build-stm32, build-esp32, unit-tests]
    steps:
      - run: echo "Toate job-urile CI au trecut OK"

  # ── Flash STM32 pe PC-ul tău (self-hosted runner Windows) ──────────────────
  # Rulează DOAR la push pe main, nu la PR și nu la tag
  # Necesită: runner Windows activ + ST-Link conectat USB
  flash-stm32:
    name: "Flash STM32"
    runs-on: [self-hosted, Windows, x64]
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build + Flash STM32
        run: powershell -ExecutionPolicy Bypass -File scripts\flash_stm32.ps1

  flash-esp32:
    name: "Flash ESP32"
    runs-on: [self-hosted, Windows, x64]
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build + Flash ESP32
        run: powershell -ExecutionPolicy Bypass -File scripts\flash_esp32.ps1

  release:
    name: "Release ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: stm32-firmware, path: out/stm32 }
      - uses: actions/download-artifact@v4
        with: { name: esp32-firmware, path: out/esp32 }
      - run: |
          mv out/stm32/zephyr.bin gloveassist-stm32-${{ github.ref_name }}.bin
          mv out/esp32/zephyr.bin gloveassist-esp32-${{ github.ref_name }}.bin
      - uses: softprops/action-gh-release@v2
        with:
          name: "GloveAssist ${{ github.ref_name }}"
          body: "Release automat. Toate testele au trecut."
          files: "*.bin"
