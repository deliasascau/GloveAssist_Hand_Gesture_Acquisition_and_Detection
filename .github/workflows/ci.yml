name: ci

on:
  push:
    branches: [ main, master, develop ]
  pull_request:

jobs:
  docs-and-structure:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required docs
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\check_required_docs.ps1

  host-unit-placeholder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect host unit tests
        id: testdetect
        run: |
          if ls tests/host/unit/*.c 1> /dev/null 2>&1; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Build host tests when present
        if: steps.testdetect.outputs.has_tests == 'true'
        run: |
          mkdir -p build/host-tests
          gcc -std=c11 -Wall -Wextra -Werror tests/host/unit/*.c -o build/host-tests/host_tests

      - name: Skip note
        if: steps.testdetect.outputs.has_tests == 'false'
        run: echo "No host unit tests yet. Stage skipped."
