name: GloveAssist CI/CD

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:

  build-stm32:
    name: "Build STM32"
    runs-on: ubuntu-latest        # fara container Docker
    steps:
      - uses: actions/checkout@v4

      - name: Install west + ARM toolchain
        run: |
          pip3 install west
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build

      - name: West init & update
        run: |
          west init -l .
          west update --narrow -o=--depth=1

      - name: Build STM32
        run: |
          west build -p always \
            -b stm32_min_dev@blue \
            application/stm32_app \
            --build-dir build-stm32

      - uses: actions/upload-artifact@v4
        with:
          name: stm32-firmware
          path: build-stm32/zephyr/zephyr.bin

  build-esp32:
    name: "Build ESP32"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ESP32 SDK e mare)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install west + Xtensa toolchain
        run: |
          pip3 install west
          sudo apt-get install -y cmake ninja-build python3-pip

      - name: West init & update
        run: |
          west init -l .
          west update --narrow -o=--depth=1

      - name: Install Zephyr SDK (Xtensa for ESP32)
        run: |
          cd /opt
          SDK=zephyr-sdk-0.16.8
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.8/${SDK}_linux-x86_64_minimal.tar.xz
          tar xf ${SDK}_linux-x86_64_minimal.tar.xz
          cd ${SDK} && ./setup.sh -t xtensa-espressif_esp32_zephyr-elf -h -c

      - name: Build ESP32
        run: |
          export ZEPHYR_SDK_INSTALL_DIR=/opt/zephyr-sdk-0.16.8
          west build -p always \
            -b esp32_devkitc/esp32/procpu \
            application/esp32_app \
            --build-dir build-esp32

      - uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: build-esp32/zephyr/zephyr.bin

  unit-tests:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install west + native_sim deps
        run: |
          pip3 install west
          sudo apt-get install -y cmake ninja-build gcc

      - name: West init & update
        run: |
          west init -l .
          west update --narrow -o=--depth=1

      - name: Build + Run tests (native_sim)
        run: |
          west build -p always -b native_sim tests --build-dir build-tests
          ./build-tests/zephyr/zephyr.exe

  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [build-stm32, build-esp32, unit-tests]
    steps:
      - run: echo "Toate job-urile CI au trecut OK"

  flash-stm32:
    name: "Flash STM32"
    runs-on: [self-hosted, Windows, x64]
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build + Flash STM32
        run: powershell -ExecutionPolicy Bypass -File scripts\flash_stm32.ps1

  flash-esp32:
    name: "Flash ESP32"
    runs-on: [self-hosted, Windows, x64]
    needs: [ci-gate]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build + Flash ESP32
        run: powershell -ExecutionPolicy Bypass -File scripts\flash_esp32.ps1

  release:
    name: "Release ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    needs: [ci-gate]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: stm32-firmware, path: out/stm32 }
      - uses: actions/download-artifact@v4
        with: { name: esp32-firmware, path: out/esp32 }
      - run: |
          mv out/stm32/zephyr.bin gloveassist-stm32-${{ github.ref_name }}.bin
          mv out/esp32/zephyr.bin gloveassist-esp32-${{ github.ref_name }}.bin
      - uses: softprops/action-gh-release@v2
        with:
          name: "GloveAssist ${{ github.ref_name }}"
          body: "Release automat. Toate testele au trecut."
          files: "*.bin"
